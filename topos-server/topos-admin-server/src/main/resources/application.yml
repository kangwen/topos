server:
  port: 8081
  servlet:
    context-path: /admin

spring:
  application:
    name: topos-admin-server
  flyway:
    enabled: true
    # 脚本在构建时从 topos-dal 拷入本模块 classpath（见 pom）；Flyway 仅支持 classpath: 前缀，不支持 classpath*:
    locations: classpath:db/migration
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/topos?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: topos
    password: topos
    druid:
      initial-size: 1
      min-idle: 1
      max-active: 20
      test-on-borrow: true
      validation-query: SELECT 1
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
  quartz:
    job-store-type: memory
    properties:
      org.quartz.scheduler.instanceName: toposAdminScheduler
      org.quartz.threadPool.threadCount: 10

token:
  header: Authorization
  secret: abcdefghijklmnopqrstuvwxyz
  expireTime: 30

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: ASSIGN_ID

management:
  endpoints:
    web:
      exposure:
        include: health,info

topos:
  quartz:
    enabled: true
  captcha:
    enabled: true
  cors:
    allowed-origins: http://localhost:80,http://localhost:8080,http://localhost:1024,http://127.0.0.1:80,http://127.0.0.1:1024,http://localhost:5173,http://127.0.0.1:5173

logging:
  level:
    root: INFO
    com.topos: INFO
    com.alibaba.druid: INFO
    org.flywaydb: INFO
